<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotující odstavec</title>
    <link rel= "stylesheet" href="style.css">
    <style>
        /* CSS pro rotující animaci */
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .rotating-paragraph {
            display: inline-block;
            animation: rotate 5s linear infinite; /* Rotace každých 5 sekund */
        }
    </style>
</head>
<body>
    <h1>Hello World</h1> 
    <p>Hello World</p>
    <p class="rotating-paragraph">Toto je druhý odstavec.</p>
</body>
</html>
