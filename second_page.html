<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>prank xd</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Styly pro rotující obrázek */
        .rotating-image {
            display: block;
            margin: 150px auto; /* Nastavte vhodný odstup od horního okraje stránky */
            width: 500px; /* Nastavte šířku obrázku podle potřeby */
            height: auto; /* Automatická výška pro zachování poměru stran */
            animation: rotate 5s linear infinite; /* Rotace každých 5 sekund */
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>A přece se točí</h1>
    <p><a href="index.html">Zpět na hlavní stránku</a></p>
    <img src="Marian.JPG" alt="Marian" class="rotating-image">
</body>
</html>
